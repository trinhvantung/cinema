server.port=8000
server.servlet.context-path=/api/auth-service
spring.application.name=auth-service
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.password=trinhvantung
spring.datasource.url=jdbc:mariadb://localhost:3306/cinema_user
spring.datasource.username=root
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

eureka.client.service-url.default-zone=http://localhost:8761/eureka

oauth2.issuer.metadata.baseUri=http://localhost:8080${server.servlet.context-path}
oauth2.issuer.metadata.issuer=${oauth2.issuer.metadata.baseUri}/issuer
oauth2.issuer.metadata.tokenEndpoint=${oauth2.issuer.metadata.baseUri}/oauth/token
oauth2.issuer.metadata.tokenKeyEndpoint=${oauth2.issuer.metadata.baseUri}/oauth/token_key
oauth2.issuer.metadata.userinfoEndpoint=${oauth2.issuer.metadata.issuer}/userinfo
oauth2.issuer.metadata.checkTokenEndpoint=${oauth2.issuer.metadata.baseUri}/oauth/check_token
oauth2.issuer.metadata.revocationEndpoint=${oauth2.issuer.metadata.baseUri}/oauth/revoke
oauth2.issuer.metadata.authorizationEndpoint=${oauth2.issuer.metadata.baseUri}/oauth/authorize
oauth2.issuer.metadata.introspectionEndpoint=${oauth2.issuer.metadata.baseUri}/oauth/introspect
oauth2.issuer.metadata.jwksUri=${oauth2.issuer.metadata.issuer}/.well-known/jwks.json
oauth2.issuer.metadata.userinfoSigningAlgSupported=RS256
oauth2.issuer.metadata.idTokenSigningAlgValuesSupported=RS256
oauth2.issuer.metadata.tokenEndpointAuthSigningAlgValuesSupported=RS256
oauth2.issuer.metadata.scopesSupported=client
oauth2.issuer.metadata.responseTypesSupported=code, token, id_token, code token, code id_token, id_token token, code id_token token
oauth2.issuer.metadata.claimsSupported=iss, sub, iat, azp, exp, scope, at_hash, c_hash, nonce
oauth2.issuer.metadata.grantTypesSupported=authorization_code, implicit, password
oauth2.issuer.metadata.tokenEndpointAuthMethodsSupported=client_secret_basic, client_secret_post
